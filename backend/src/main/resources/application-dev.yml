spring:
  jpa:
    hibernate:
      ddl-auto: update    # dev: tự update schema
    properties:
      hibernate:
        hbm2ddl:
          create_namespaces: true   # tự CREATE SCHEMA cho user_schema, post_schema, …
    show-sql: true

  liquibase:
    enabled: false        # dev: dùng ddl-auto thay Liquibase

logging:
  level:
    com.viper: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
