spring:
  jpa:
    hibernate:
      ddl-auto: validate   # dev khớp prod: Liquibase tạo schema, JPA chỉ validate
    show-sql: true

  liquibase:
    enabled: true          # chạy migration ở dev để bắt lệch schema sớm

logging:
  level:
    com.viper: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
